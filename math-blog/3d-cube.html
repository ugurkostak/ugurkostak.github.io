<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width,initial-scale=1" name="viewport">
  <meta content="3D Cube Visualization - Interactive mathematical beauty" name="description">
  <meta name="google" content="notranslate" />
  <meta content="Mashup templates have been developped by Orson.io team" name="author">

  <!-- Disable tap highlight on IE -->
  <meta name="msapplication-tap-highlight" content="no">
  
  <link href="../assets/apple-icon-180x180.png" rel="apple-touch-icon">
  <link href="../assets/favicon.ico" rel="icon">

  <title>3D Cube Visualization</title>

  <link href="../assets/css/main.82cfd66e.css" rel="stylesheet">
  <style>
    body {
      background: #111;
      color: #fff;
    }
    
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<script type="module">
import * as THREE from "../assets/js/vendor/three.module.min.js";

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, canvas: document.getElementById('canvas') });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x111111);

// Cube
const geometry = new THREE.BoxGeometry();
const material = new THREE.MeshNormalMaterial();
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

// Mouse control
let isDragging = false;
let prev = { x: 0, y: 0 };

document.addEventListener("mousedown", (e) => {
  isDragging = true;
  prev = { x: e.clientX, y: e.clientY };
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const dx = e.clientX - prev.x;
  const dy = e.clientY - prev.y;

  cube.rotation.y += dx * 0.01;
  cube.rotation.x += dy * 0.01;

  prev = { x: e.clientX, y: e.clientY };
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>

</html>
